name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # version requirements.txt was resolved on
      - name: Install
        run: make install
      - name: Lint (syntax check)
        run: make lint
      - name: Test
        run: make test
